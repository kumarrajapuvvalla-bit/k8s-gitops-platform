# Dev environment overrides
replicaCount: 1

image:
  tag: "dev-latest"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false

ingress:
  enabled: true
  hosts:
    - host: app-dev.example.com
      paths:
        - path: /
          pathType: Prefix
